<script>
    // --- GITHUB CLOUD DATABASE STATE ---
    let fleetData = [];
    let recordToDelete = null;
    let currentSort = { column: null, direction: 'asc' };
    
    // GLOBAL Cloud Configuration (Required so the Second App can read it via window.parent)
    window.cloudConfig = {
        owner: 'BuraqERP',
        repo: 'Buraq',
        path: 'financial_db.enc', // Main app DB
        token: null,
        secretKey: null,
        fileSha: null 
    };

    // --- INITIALIZATION ---
    function initApp() {
        lucide.createIcons();
        // Do NOT fetch data immediately. Wait for the user to log in via authenticateAndLoad()
    }

    // --- CLOUD AUTHENTICATION (HARDCODED PASS + TRUE TOKEN VERIFICATION) ---
    async function authenticateAndLoad() {
        const token = document.getElementById('auth_token').value.replace(/[^\x20-\x7E]/g, '').trim();
        const pass = document.getElementById('auth_pass').value;
        const errBox = document.getElementById('auth_error');
        const errMsg = document.getElementById('auth_error_msg');
        const btnText = document.getElementById('auth_btn_text');
        const btnIcon = document.getElementById('auth_btn_icon');

        // 1. HARDCODED PASSWORD CHECK
        if (pass !== 'adminadmin') {
            errBox.classList.remove('hidden');
            errMsg.innerText = "Invalid Master Password.";
            return;
        }

        // 2. EMPTY TOKEN CHECK
        if (!token) {
            errBox.classList.remove('hidden');
            errMsg.innerText = "GitHub Token is required.";
            return;
        }

        // UI Loading State
        errBox.classList.add('hidden');
        btnText.innerText = "Verifying Token...";
        btnIcon.setAttribute('data-lucide', 'loader-2');
        btnIcon.classList.add('animate-spin');
        lucide.createIcons();

        try {
            // 3. TRUE TOKEN VERIFICATION
            const userCheck = await fetch('https://api.github.com/user', {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!userCheck.ok) {
                throw new Error("Invalid GitHub Token. Access denied by GitHub.");
            }

            // Token is real! Let's get the database.
            btnText.innerText = "Decrypting Database...";
            
            const response = await fetch(`https://api.github.com/repos/${window.cloudConfig.owner}/${window.cloudConfig.repo}/contents/${window.cloudConfig.path}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                cache: 'no-store' // <--- THE FIX: This safely bypasses cache without breaking CORS
            });

            if (response.status === 404) {
                // --- FIRST TIME SETUP ---
                fleetData = [];
                window.cloudConfig.token = token;
                window.cloudConfig.secretKey = pass; 
                await saveData(true); 
                renderTable();
                unlockUI();
                showToast("New encrypted database created.", "success");
                return;
            }

            if (!response.ok) {
                throw new Error(`GitHub API Error: ${response.status} ${response.statusText}`);
            }

            // --- EXISTING DATABASE LOAD ---
            const result = await response.json();
            window.cloudConfig.fileSha = result.sha; 
            
            // Decode Base64 from GitHub
            const decodedContent = atob(result.content.replace(/\n/g, ''));
            
            // Decrypt with Master Password
            const decryptedBytes = CryptoJS.AES.decrypt(decodedContent, pass);
            const decryptedString = decryptedBytes.toString(CryptoJS.enc.Utf8);
            
            if (!decryptedString) {
                throw new Error("Decryption failed. Database may be corrupted.");
            }

            // Success! Load into memory
            fleetData = JSON.parse(decryptedString);
            window.cloudConfig.token = token;
            window.cloudConfig.secretKey = pass;
            
            renderTable();
            unlockUI();
            showToast("Database decrypted and synchronized.", "success");

        } catch (error) {
            errBox.classList.remove('hidden');
            errMsg.innerText = error.message;
            btnText.innerText = "Decrypt & Access Workspace";
            btnIcon.setAttribute('data-lucide', 'unlock');
            btnIcon.classList.remove('animate-spin');
            lucide.createIcons();
        }
    }

    function unlockUI() {
        const overlay = document.getElementById('authOverlay');
        if(overlay) overlay.classList.add('auth-exit');
        lucide.createIcons();
    }

    // --- ZERO-LACKS CLOUD SAVE (WITH CONFLICT RESOLUTION) ---
    async function saveData(isInitial = false) {
        if (!window.cloudConfig.token || !window.cloudConfig.secretKey) return;

        try {
            const jsonString = JSON.stringify(fleetData);
            const encryptedData = CryptoJS.AES.encrypt(jsonString, window.cloudConfig.secretKey).toString();
            const base64Content = btoa(encryptedData);

            const payload = {
                message: "Auto-sync: Financial DB updated via Buraq App",
                content: base64Content
            };
            if (window.cloudConfig.fileSha) payload.sha = window.cloudConfig.fileSha;

            let response = await fetch(`https://api.github.com/repos/${window.cloudConfig.owner}/${window.cloudConfig.repo}/contents/${window.cloudConfig.path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${window.cloudConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            });

            // Handle 409 Conflict automatically
            if (response.status === 409) {
                console.warn("SHA Conflict detected. Resolving automatically...");
                const latestRes = await fetch(`https://api.github.com/repos/${window.cloudConfig.owner}/${window.cloudConfig.repo}/contents/${window.cloudConfig.path}`, {
                    headers: { 
                        'Authorization': `Bearer ${window.cloudConfig.token}`, 
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    cache: 'no-store' // <--- THE FIX: Ensures we get the true latest SHA, no cache
                });
                const latestData = await latestRes.json();
                
                payload.sha = latestData.sha; 
                response = await fetch(`https://api.github.com/repos/${window.cloudConfig.owner}/${window.cloudConfig.repo}/contents/${window.cloudConfig.path}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${window.cloudConfig.token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });
            }

            if (!response.ok) throw new Error("Cloud save failed.");

            const result = await response.json();
            window.cloudConfig.fileSha = result.content.sha; 
            
            if (!isInitial) showToast("Financials securely synced to cloud.", "success");
        } catch (error) {
            showToast("Cloud sync failed. Data only saved in memory.", "error");
            console.error(error);
        }
    }

    // --- TOAST NOTIFICATIONS ---
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        
        const isSuccess = type === 'success';
        const icon = isSuccess ? 'check-circle' : 'alert-circle';
        const bgClass = isSuccess ? 'bg-emerald-50 border border-emerald-200 text-emerald-800' : 'bg-red-50 border border-red-200 text-red-800';
        const iconColor = isSuccess ? 'text-emerald-500' : 'text-red-500';

        toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-modal pointer-events-auto toast-enter ${bgClass} mb-2`;
        toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 ${iconColor}"></i><span class="font-bold text-sm tracking-wide">${message}</span>`;
        
        container.appendChild(toast);
        lucide.createIcons();

        setTimeout(() => {
            toast.classList.replace('toast-enter', 'toast-exit');
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // --- UTILS & MATH ENGINE ---
    function isDuplicate(id, start, end, platform, excludeInternalId = null) {
        return fleetData.some(entry => 
            entry.id.toString().trim() === id.toString().trim() &&
            entry.startDate === start &&
            entry.endDate === end &&
            entry.platform === platform &&
            (excludeInternalId ? entry._internalId !== excludeInternalId : true)
        );
    }

    function formatDisplayDate(start, end) {
        if (!start && !end) return 'N/A';
        if (start && !end) return start;
        if (!start && end) return end;
        try {
            const s = new Date(start); const e = new Date(end);
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const sDay = String(s.getDate()).padStart(2, '0'); const sMon = months[s.getMonth()].toUpperCase();
            const eDay = String(e.getDate()).padStart(2, '0'); const eMon = months[e.getMonth()].toUpperCase();
            return sMon === eMon ? `${sDay}-${eDay} ${sMon}` : `${sDay} ${sMon} - ${eDay} ${eMon}`;
        } catch(e) { return `${start} to ${end}`; }
    }

    const parseNum = (val) => {
        if (!val) return 0;
        const cleaned = val.toString().replace(/[^\d.-]/g, '');
        return parseFloat(cleaned) || 0;
    };

    function calculateFormulas(entry) {
        // 1. Core Earnings (No Tips)
        const venituri = entry.comenzi + entry.bonusNum + entry.alteBonus;
        
        // 2. Correct Commission (Dynamic %, applied ONLY to earnings)
        const actualComm = venituri * entry.comisioPct;
        const castigNet = venituri - actualComm;
        
        // 3. Deductions & Tips
        const totalDeductions = Math.abs(entry.taxa) + Math.abs(entry.contract) + Math.abs(entry.compensare);
        const totalEarn = venituri + entry.bacsis; // Gross Earn
        
        // 4. Final Payouts
        const salary = castigNet + entry.bacsis - totalDeductions;
        const bcom6Val = venituri * 0.06; // Assuming Fleet Tax shouldn't tax tips either
        
        const totalVenit = salary; 
        const net = castigNet + entry.bacsis - entry.taxa;

        return { 
            venituri, 
            castigNet, 
            totalVenit, 
            net, 
            bcom6Val, 
            salary, 
            totalEarn, 
            stdComm: actualComm 
        };
    }

    // --- PASTE ENGINE ---
    function processPaste() {
        const rawText = document.getElementById('pasteArea').value.trim();
        const pStart = document.getElementById('paste_start').value;
        const pEnd = document.getElementById('paste_end').value;
        const pPlatform = document.getElementById('paste_platform').value;
        
        if (!pStart || !pEnd) { showToast("Cycle Start and End dates are required.", 'error'); return; }
        if (!rawText) return;

        const rows = rawText.split('\n');
        let addedCount = 0;
        let skippedCount = 0;

        rows.forEach(row => {
            const cols = row.split('\t');
            if (cols.length < 2) return;
            
            let offset = 0;
            if (!cols[0] && cols[1] && !isNaN(parseFloat(cols[3]))) {
                offset = 1;
            }

            const cId = cols[0 + offset] ? cols[0 + offset].trim() : '';
            if(!cId) return;
            
            if (isDuplicate(cId, pStart, pEnd, pPlatform)) {
                skippedCount++;
                return; 
            }

            let cp = parseNum(cols[6 + offset]); if (cp === 0) cp = 4;

            fleetData.unshift({
                _internalId: Date.now() + Math.random().toString(),
                startDate: pStart, endDate: pEnd, platform: pPlatform, isPaid: false,
                id: cId, nume: cols[1 + offset] ? cols[1 + offset].trim() : '',
                comenzi: parseNum(cols[2 + offset]), bonusNum: parseNum(cols[3 + offset]), alteBonus: parseNum(cols[4 + offset]),
                comisioPct: cp / 100, bacsis: parseNum(cols[8 + offset]),
                compensare: Math.abs(parseNum(cols[9 + offset])), 
                taxa: Math.abs(parseNum(cols[10 + offset])), 
                contract: Math.abs(parseNum(cols[11 + offset]))
            });
            addedCount++;
        });

        document.getElementById('pasteArea').value = '';
        togglePasteModal(false);
        
        saveData(); 
        renderTable();

        if (addedCount > 0 && skippedCount === 0) showToast(`Successfully imported ${addedCount} records.`, 'success');
        else if (addedCount > 0 && skippedCount > 0) showToast(`Imported ${addedCount} records. Skipped ${skippedCount} duplicates.`, 'success');
        else if (addedCount === 0 && skippedCount > 0) showToast(`No new records added. Skipped ${skippedCount} duplicates.`, 'error');
    }

    function togglePasteModal(show) { 
        const m = document.getElementById('pasteModal'); 
        if (m) show ? m.classList.remove('hidden') : m.classList.add('hidden'); 
    }

    // --- FORM ENGINE ---
    function openFormModal(internalId = null) {
        const errBox = document.getElementById('form_error_box');
        if (errBox) errBox.classList.add('hidden');

        if (internalId) {
            document.getElementById('formModalTitle').innerHTML = '<div class="bg-amber-50 p-1.5 rounded-lg"><i data-lucide="edit-3" class="w-5 h-5 text-amber-600"></i></div> Edit Financial Record';
            const e = fleetData.find(x => x._internalId === internalId);
            document.getElementById('form_internal_id').value = e._internalId;
            document.getElementById('form_platform').value = e.platform;
            document.getElementById('form_start').value = e.startDate;
            document.getElementById('form_end').value = e.endDate;
            document.getElementById('form_id').value = e.id;
            document.getElementById('form_nume').value = e.nume;
            document.getElementById('form_comisio').value = (e.comisioPct * 100).toFixed(2);
            document.getElementById('form_comenzi').value = e.comenzi;
            document.getElementById('form_bonus').value = e.bonusNum;
            document.getElementById('form_alte').value = e.alteBonus;
            document.getElementById('form_bacsis').value = e.bacsis;
            document.getElementById('form_compensare').value = e.compensare;
            document.getElementById('form_taxa').value = e.taxa;
            document.getElementById('form_contract').value = e.contract;
            document.getElementById('form_status').value = e.isPaid ? "true" : "false";
        } else {
            document.getElementById('formModalTitle').innerHTML = '<div class="bg-blue-50 p-1.5 rounded-lg"><i data-lucide="file-plus" class="w-5 h-5 text-brandAccent"></i></div> Create Financial Record';
            document.getElementById('form_internal_id').value = '';
            document.getElementById('form_platform').value = 'WOLT';
            document.getElementById('form_start').value = '';
            document.getElementById('form_end').value = '';
            document.getElementById('form_id').value = '';
            document.getElementById('form_nume').value = '';
            document.getElementById('form_comisio').value = '';
            document.getElementById('form_comenzi').value = '';
            document.getElementById('form_bonus').value = '';
            document.getElementById('form_alte').value = '';
            document.getElementById('form_bacsis').value = '';
            document.getElementById('form_compensare').value = '';
            document.getElementById('form_taxa').value = '';
            document.getElementById('form_contract').value = '';
            document.getElementById('form_status').value = "false";
        }
        
        document.getElementById('formModal').classList.remove('hidden');
        lucide.createIcons();
    }

    function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

    function saveFormRecord() {
        const internalId = document.getElementById('form_internal_id').value;
        const plat = document.getElementById('form_platform').value;
        const start = document.getElementById('form_start').value;
        const end = document.getElementById('form_end').value;
        const id = document.getElementById('form_id').value;
        const nume = document.getElementById('form_nume').value;

        const errBox = document.getElementById('form_error_box');
        const errMsg = document.getElementById('form_error_msg');

        if (!start || !end || !id || !nume) {
            errBox.classList.remove('hidden');
            errMsg.innerText = "Please fill in all required fields (*).";
            return;
        }

        if (isDuplicate(id, start, end, plat, internalId)) {
            errBox.classList.remove('hidden');
            errMsg.innerText = `A record for ID ${id} already exists for ${plat} in this cycle.`;
            return;
        }

        const payload = {
            platform: plat, startDate: start, endDate: end, id: id, nume: nume,
            comisioPct: parseFloat(document.getElementById('form_comisio').value) / 100 || 0,
            comenzi: parseNum(document.getElementById('form_comenzi').value),
            bonusNum: parseNum(document.getElementById('form_bonus').value),
            alteBonus: parseNum(document.getElementById('form_alte').value),
            bacsis: parseNum(document.getElementById('form_bacsis').value),
            compensare: Math.abs(parseNum(document.getElementById('form_compensare').value)),
            taxa: Math.abs(parseNum(document.getElementById('form_taxa').value)),
            contract: Math.abs(parseNum(document.getElementById('form_contract').value)),
            isPaid: document.getElementById('form_status').value === "true"
        };

        if (internalId) {
            const i = fleetData.findIndex(x => x._internalId === internalId);
            if (i !== -1) fleetData[i] = { ...fleetData[i], ...payload };
            showToast("Record updated successfully.");
        } else {
            payload._internalId = Date.now() + Math.random().toString();
            fleetData.unshift(payload);
            showToast("New record created successfully.");
        }

        saveData(); 
        closeFormModal();
        renderTable();
    }

    // --- DELETE ENGINE ---
    function confirmDelete(internalId) {
        recordToDelete = internalId;
        document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
        recordToDelete = null;
        document.getElementById('deleteModal').classList.add('hidden');
    }

    function executeDelete() {
        if(recordToDelete) {
            fleetData = fleetData.filter(e => e._internalId !== recordToDelete);
            showToast("Record successfully deleted.", "success");
            saveData(); 
            renderTable();
        }
        closeDeleteModal();
    }

    // --- UI UTILS & BULK ACTIONS ---
    function clearFilters() {
        document.getElementById('filter_start').value = '';
        document.getElementById('filter_end').value = '';
        document.getElementById('filter_platform').value = 'ALL';
        document.getElementById('filter_name').value = '';
        renderTable();
    }

    function toggleSelectAll(source) {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
    }

    function updateBulkStatus(statusBoolean) {
        const checkboxes = document.querySelectorAll('.row-checkbox:checked');
        if (checkboxes.length === 0) { showToast("Select records using checkboxes first.", 'error'); return; }
        const ids = Array.from(checkboxes).map(cb => cb.value);
        fleetData.forEach(entry => { if (ids.includes(entry._internalId)) entry.isPaid = statusBoolean; });
        showToast(`Settlement status updated for ${ids.length} records.`);
        saveData(); 
        renderTable();
    }

    // --- SUMMARY POPUP ---
    function openSummary(internalId) {
        const entry = fleetData.find(e => e._internalId === internalId);
        if(!entry) return;
        const calc = calculateFormulas(entry);

        const totalEarning = calc.totalEarn;
        const commission = calc.stdComm; // Uses dynamic commission
        const afterCommission = totalEarning - commission;
        const appFee = Math.abs(entry.taxa);
        const contract = Math.abs(entry.contract);
        const cashOffset = Math.abs(entry.compensare);
        const totalPaid = afterCommission - appFee - contract - cashOffset;

        document.getElementById('sum_courier_name').innerText = entry.nume;
        document.getElementById('sum_week_header').innerText = formatDisplayDate(entry.startDate, entry.endDate);
        
        document.getElementById('sum_tot_earn').innerText = totalEarning.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_comm_val').innerText = commission.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_after_comm').innerText = afterCommission.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_app_fee').innerText = appFee.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_contract').innerText = contract.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_offset').innerText = cashOffset.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum_total_paid').innerText = totalPaid.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

        const platHeader = document.getElementById('sum_platform_header');
        platHeader.innerText = entry.platform;

        if (entry.platform === 'GLOVO') {
            platHeader.style.backgroundColor = '#f59e0b';
            platHeader.style.color = '#ffffff';
        } else if (entry.platform === 'BOLT') {
            platHeader.style.backgroundColor = '#10b981';
            platHeader.style.color = '#ffffff';
        } else { 
            platHeader.style.backgroundColor = '#0ea5e9';
            platHeader.style.color = '#ffffff';
        }

        document.getElementById('summaryModal').classList.remove('hidden');
    }
    
    function closeSummary() { document.getElementById('summaryModal').classList.add('hidden'); }

    // --- EXPORT ENGINE ---
    function toggleExportModal(show) {
        const modal = document.getElementById('exportModal');
        if (!modal) return;
        if (show) {
            if (fleetData.length === 0) { showToast("No data to export.", 'error'); return; }
            modal.classList.remove('hidden');
        } else { 
            modal.classList.add('hidden'); 
        }
    }

    function executeExcelExport() {
        const exStart = document.getElementById('export_start').value;
        const exEnd = document.getElementById('export_end').value;
        const exPlat = document.getElementById('export_platform').value;
        
        let dataToExport = fleetData.filter(entry => {
            const passStart = exStart ? entry.startDate >= exStart : true;
            const passEnd = exEnd ? entry.endDate <= exEnd : true;
            const passPlat = exPlat === 'ALL' ? true : entry.platform === exPlat;
            return passStart && passEnd && passPlat;
        });

        if (dataToExport.length === 0) { showToast("No records found for the selected filters.", 'error'); return; }

        const excelData = dataToExport.map(entry => {
            const calc = calculateFormulas(entry);
            return {
                "Date Range": formatDisplayDate(entry.startDate, entry.endDate),
                "Platform": entry.platform,
                "Id curier": entry.id, "Nume": entry.nume, "Comenzi": entry.comenzi,
                "Bonus Num": entry.bonusNum, "Alte bonu": entry.alteBonus, "VENITURI": calc.venituri,
                "COMISION": entry.comisioPct, "Castig ne": calc.castigNet, "Bacsis": entry.bacsis,
                "Compens": entry.compensare !== 0 ? -Math.abs(entry.compensare) : 0,
                "Taxa apli": entry.taxa !== 0 ? -Math.abs(entry.taxa) : 0,
                "Contract": entry.contract !== 0 ? -Math.abs(entry.contract) : 0,
                "Total Venit": calc.totalVenit,
                "NET": calc.net, "BCOM6%": calc.bcom6Val, "Salary": calc.salary,
                "Total Ear": calc.totalEarn, "Status": entry.isPaid ? "Paid" : "Unpaid"
            };
        });

        const ws = XLSX.utils.json_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Financial_Data");
        XLSX.writeFile(wb, `Buraq_Financial_Export_${exStart||'All'}.xlsx`);
        toggleExportModal(false);
        showToast("Excel file generated successfully.", "success");
    }

    // --- TABLE RENDERING & AGGREGATION ---
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        const masterCheckbox = document.getElementById('masterCheckbox');
        if(masterCheckbox) masterCheckbox.checked = false;

        const fStart = document.getElementById('filter_start') ? document.getElementById('filter_start').value : '';
        const fEnd = document.getElementById('filter_end') ? document.getElementById('filter_end').value : '';
        const fPlat = document.getElementById('filter_platform') ? document.getElementById('filter_platform').value : 'ALL';
        const fName = document.getElementById('filter_name') ? (document.getElementById('filter_name').value || '').toLowerCase().trim() : '';

        let totalSalarySum = 0; 
        let totalBcomSum = 0; 
        let totalContractSum = 0;
        
        let agg = {
            WOLT:  { sal: 0, com: 0, con: 0 },
            GLOVO: { sal: 0, com: 0, con: 0 },
            BOLT:  { sal: 0, com: 0, con: 0 }
        };

        const filteredData = fleetData.filter(entry => {
            const passStart = fStart ? entry.startDate >= fStart : true;
            const passEnd = fEnd ? entry.endDate <= fEnd : true;
            const passPlat = fPlat === 'ALL' ? true : entry.platform === fPlat;
            const matchName = (entry.nume || '').toLowerCase().includes(fName);
            
            const calc = calculateFormulas(entry);
            
            if (passStart && passEnd && passPlat && matchName) {
                if(agg[entry.platform]) {
                    agg[entry.platform].sal += calc.salary;
                    agg[entry.platform].com += calc.stdComm;
                    agg[entry.platform].con += Math.abs(entry.contract);
                }
            }

            return passStart && passEnd && passPlat && matchName;
        });

        if (document.getElementById('wolt_sal')) {
            document.getElementById('wolt_sal').innerText = agg.WOLT.sal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('wolt_com').innerText = agg.WOLT.com.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('wolt_con').innerText = agg.WOLT.con.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            document.getElementById('glovo_sal').innerText = agg.GLOVO.sal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('glovo_com').innerText = agg.GLOVO.com.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('glovo_con').innerText = agg.GLOVO.con.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            document.getElementById('bolt_sal').innerText = agg.BOLT.sal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('bolt_com').innerText = agg.BOLT.com.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('bolt_con').innerText = agg.BOLT.con.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        if (filteredData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="24" class="text-center py-12 text-slate-400 bg-white text-sm font-bold tracking-wide">NO MATCHING RECORDS FOUND</td></tr>`;
        }

        filteredData.forEach((entry) => {
            const calc = calculateFormulas(entry);
            totalSalarySum += calc.salary; 
            totalBcomSum += calc.bcom6Val; 
            totalContractSum += Math.abs(entry.contract);

            const fmt = (num) => num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const colorNeg = (num, defClass) => num < 0 ? 'text-negRed font-extrabold' : defClass;
            const formatDeduction = (num) => num > 0 ? `<span class="text-negRed font-extrabold">-${fmt(num)}</span>` : `<span class="text-slate-400 font-medium">0.00</span>`;

            const statusBadge = entry.isPaid 
                ? `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-extrabold uppercase bg-emerald-50 text-emerald-600 border border-emerald-200 shadow-sm"><i data-lucide="check" class="w-3 h-3"></i> Paid</span>`
                : `<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-[10px] font-extrabold uppercase bg-amber-50 text-amber-600 border border-amber-200 shadow-sm"><i data-lucide="clock" class="w-3 h-3"></i> Unpaid</span>`;

            const displayDate = formatDisplayDate(entry.startDate, entry.endDate);

            let platClass = "bg-slate-100 text-slate-600 border border-slate-200";
            if(entry.platform === 'WOLT') platClass = "bg-blue-50 text-wolt border border-blue-100";
            if(entry.platform === 'GLOVO') platClass = "bg-amber-50 text-glovo border border-amber-100";
            if(entry.platform === 'BOLT') platClass = "bg-emerald-50 text-bolt border border-emerald-100";

            tbody.innerHTML += `
                <tr class="hover:bg-slate-50 bg-white transition-colors group">
                    <td class="px-4 py-3.5 text-center border-b border-slate-100"><input type="checkbox" value="${entry._internalId}" class="row-checkbox rounded border-slate-400 text-brandAccent focus:ring-brandAccent cursor-pointer w-4 h-4 transition"></td>
                    <td class="px-4 py-3.5 border-b border-slate-100 font-bold text-brandAccent bg-blue-50/20">${displayDate}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 font-extrabold"><span class="px-2.5 py-1 rounded-md text-[10px] uppercase tracking-widest ${platClass}">${entry.platform}</span></td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-slate-500 font-bold tracking-wide">${entry.id}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 font-extrabold">
                        <button onclick="openSummary('${entry._internalId}')" class="text-brandAccent hover:text-navyHeader hover:underline transition-all text-left truncate max-w-[150px] inline-block align-middle">${entry.nume}</button>
                    </td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-medium">${fmt(entry.comenzi)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-medium">${entry.bonusNum !== 0 ? fmt(entry.bonusNum) : '-'}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-medium">${entry.alteBonus !== 0 ? fmt(entry.alteBonus) : '-'}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold text-brandAccent">${fmt(calc.venituri)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right text-slate-500 font-bold">${(entry.comisioPct * 100).toFixed(2)}%</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold ${colorNeg(calc.castigNet, 'text-slate-700')}">${fmt(calc.castigNet)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold text-posGreen">${entry.bacsis !== 0 ? fmt(entry.bacsis) : '-'}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right">${formatDeduction(entry.compensare)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right">${formatDeduction(entry.taxa)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right">${formatDeduction(entry.contract)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold ${colorNeg(calc.totalVenit, 'text-slate-700')}">${fmt(calc.totalVenit)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold ${colorNeg(calc.net, 'text-slate-900')}">${fmt(calc.net)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold text-brandAccent">${fmt(calc.bcom6Val)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right text-[15px] ${calc.salary < 0 ? 'text-negRed font-extrabold' : 'text-slate-900 font-extrabold'}">${fmt(calc.salary)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-right font-extrabold text-posGreen">${fmt(calc.totalEarn)}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-center">${statusBadge}</td>
                    <td class="px-4 py-3.5 border-b border-slate-100 text-center flex justify-center gap-2.5">
                        <button onclick="openFormModal('${entry._internalId}')" class="text-slate-400 hover:text-brandAccent transition-colors p-1.5 rounded-md hover:bg-blue-50" title="Edit Record"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="confirmDelete('${entry._internalId}')" class="text-slate-400 hover:text-negRed transition-colors p-1.5 rounded-md hover:bg-red-50" title="Delete Record"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `;
        });

        if (document.getElementById('kpi_salary')) document.getElementById('kpi_salary').innerText = totalSalarySum.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        if (document.getElementById('kpi_bcom')) document.getElementById('kpi_bcom').innerText = totalBcomSum.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        if (document.getElementById('kpi_contract')) document.getElementById('kpi_contract').innerText = totalContractSum.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        if (document.getElementById('recordCount')) document.getElementById('recordCount').innerText = `${filteredData.length} records indexed`;

        lucide.createIcons();
    }

    // --- WORKSPACE SWITCHER LOGIC ---
    function openSecondApp() {
        const overlay = document.getElementById('app-overlay');
        const iframe = document.getElementById('app-iframe');
        
        if (overlay) {
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
            }, 10);
        }
        
        if (iframe && (!iframe.src || iframe.src === window.location.href || iframe.src === '')) {
            iframe.src = 'couriers.html';
        }
    }
    
    // --- WORKSPACE SWITCHER FIX: PROPERLY CLOSE IFRAME LAYER ---
    function closeSecondApp() {
        const overlay = document.getElementById('app-overlay');
        
        if (overlay) {
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            
            setTimeout(() => {
                overlay.classList.remove('flex');
                overlay.classList.add('hidden');
            }, 300); 
        }
    }

    // Initialize App on Load
    document.addEventListener('DOMContentLoaded', initApp);
</script>
