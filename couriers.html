<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buraq Courier Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { appBg: '#f8fafc', panelBg: '#ffffff', borderColor: '#e2e8f0', brandAccent: '#2563eb', posGreen: '#10b981', negRed: '#ef4444' }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.appBg'); color: #1e293b; font-size: 14px; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.96) translateY(-15px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-enter { animation: slideInRight 0.4s forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-12 antialiased selection:bg-brandAccent selection:text-white">
    <header class="bg-slate-900 text-white shadow-lg mb-8 border-b border-slate-700">
        <div class="max-w-[1800px] mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-white/10 p-2.5 rounded-xl"><i data-lucide="users" class="w-6 h-6 text-blue-100"></i></div>
                <h1 class="text-2xl font-extrabold tracking-wide uppercase">Courier Database</h1>
            </div>
            <button onclick="openFormModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                <i data-lucide="user-plus" class="w-4 h-4"></i> Add Courier
            </button>
        </div>
    </header>

    <main class="max-w-[1800px] mx-auto space-y-8 px-6">
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-brandAccent">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total Registered</p>
                <p class="text-4xl font-extrabold text-slate-800" id="kpi_total">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Active Working</p>
                <p class="text-4xl font-extrabold text-posGreen" id="kpi_active">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm border-l-4 border-l-red-500">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Inactive / Pending</p>
                <p class="text-4xl font-extrabold text-red-600" id="kpi_inactive">0</p>
            </div>
        </section>

        <section class="border border-slate-200 rounded-2xl bg-white shadow-sm overflow-hidden">
            <table class="w-full text-left whitespace-nowrap">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                        <th class="px-4 py-4">ID</th>
                        <th class="px-4 py-4">Name & Contact</th>
                        <th class="px-4 py-4">Platform</th>
                        <th class="px-4 py-4 text-center">Status</th>
                        <th class="px-4 py-4 text-center">Manage</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
        </section>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3"></div>

    <div id="formModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeFormModal()"></div>
        <div class="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl modal-enter flex flex-col">
            <div class="flex justify-between p-6 border-b"><h3 class="font-extrabold text-lg">Manage Courier</h3><button onclick="closeFormModal()"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div class="p-6 space-y-5">
                <input type="hidden" id="form_index">
                <div class="grid grid-cols-2 gap-5">
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">ID *</label><input type="text" id="form_id" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 focus:ring-2 focus:ring-brandAccent outline-none" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Name *</label><input type="text" id="form_name" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 focus:ring-2 focus:ring-brandAccent outline-none" required></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Phone</label><input type="text" id="form_phone" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 outline-none"></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Platform</label><select id="form_platform" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 outline-none"><option>WOLT</option><option>GLOVO</option><option>BOLT</option><option>TAZZ</option></select></div>
                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Status</label><select id="form_status" class="w-full border rounded-lg p-2.5 text-sm bg-slate-50 outline-none"><option>Active</option><option>Inactive</option></select></div>
                </div>
            </div>
            <div class="p-5 border-t bg-slate-50 flex gap-3">
                <button onclick="closeFormModal()" class="flex-1 py-3 bg-white border rounded-xl font-bold hover:bg-slate-100 transition-colors">Cancel</button>
                <button onclick="saveFormRecord()" class="flex-1 py-3 bg-brandAccent text-white rounded-xl font-bold hover:bg-blue-700 transition-colors">Save Profile</button>
            </div>
        </div>
    </div>

    <script>
        let fleetData = [];
        let cloudSha = null;

        // --- CLOUD SYNC INITIALIZATION ---
        async function initApp() {
            lucide.createIcons();
            
            // Wait for parent window to pass the cloud credentials
            if (!window.parent || !window.parent.cloudConfig || !window.parent.cloudConfig.token) {
                showToast("Not authenticated. Please log in on the main screen.", "error");
                return;
            }

            const config = window.parent.cloudConfig;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/couriers_db.enc`, {
                    headers: { 'Authorization': `Bearer ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (response.status === 404) {
                    fleetData = []; await saveData(true); renderTable(); return;
                }

                if (!response.ok) throw new Error("Failed to fetch cloud data.");

                const data = await response.json();
                cloudSha = data.sha;
                
                // Decrypt data securely in browser
                const encryptedContent = atob(data.content.replace(/\n/g, ''));
                const bytes = window.parent.CryptoJS.AES.decrypt(encryptedContent, config.secretKey);
                const decryptedString = bytes.toString(window.parent.CryptoJS.enc.Utf8);

                if (decryptedString) fleetData = JSON.parse(decryptedString);
                renderTable();
            } catch (error) {
                console.error(error);
                showToast("Failed to decrypt database.", "error");
            }
        }

        async function saveData(isInitial = false) {
            if (!window.parent.cloudConfig) return;
            const config = window.parent.cloudConfig;

            try {
                const encryptedData = window.parent.CryptoJS.AES.encrypt(JSON.stringify(fleetData), config.secretKey).toString();
                const payload = { message: "Sync: Courier Database Update", content: btoa(encryptedData) };
                if (cloudSha) payload.sha = cloudSha;

                const response = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/couriers_db.enc`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${config.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Sync Failed");
                const result = await response.json();
                cloudSha = result.content.sha;
                
                if (!isInitial) showToast("Database synced to GitHub.", "success");
            } catch (error) {
                showToast("Cloud sync failed.", "error");
            }
        }

        function showToast(msg, type='success') {
            const cont = document.getElementById('toastContainer');
            const color = type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-red-50 text-red-800 border-red-200';
            cont.innerHTML += `<div class="toast-enter ${color} px-5 py-3 border rounded-xl font-bold shadow-lg mb-2">${msg}</div>`;
            setTimeout(() => { cont.firstChild.remove(); }, 3000);
        }

        function openFormModal(index = null) {
            document.getElementById('form_index').value = index !== null ? index : '';
            if (index !== null) {
                const e = fleetData[index];
                document.getElementById('form_id').value = e.id; document.getElementById('form_name').value = e.name;
                document.getElementById('form_phone').value = e.phone || ''; document.getElementById('form_platform').value = e.platform;
                document.getElementById('form_status').value = e.status;
            } else {
                ['form_id','form_name','form_phone'].forEach(id => document.getElementById(id).value = '');
            }
            document.getElementById('formModal').classList.remove('hidden');
        }

        function closeFormModal() { document.getElementById('formModal').classList.add('hidden'); }

        function saveFormRecord() {
            const idx = document.getElementById('form_index').value;
            const payload = {
                id: document.getElementById('form_id').value.trim(), name: document.getElementById('form_name').value.trim(),
                phone: document.getElementById('form_phone').value, platform: document.getElementById('form_platform').value,
                status: document.getElementById('form_status').value
            };
            if(!payload.id || !payload.name) return showToast("ID and Name are required.", "error");
            
            if (idx !== '') fleetData[idx] = payload;
            else fleetData.unshift(payload);
            
            saveData(); closeFormModal(); renderTable();
        }

        function deleteRecord(idx) {
            if(confirm("Permanently delete this courier?")) {
                fleetData.splice(idx, 1);
                saveData(); renderTable();
                showToast("Record deleted.", "success");
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
            let act = 0, inact = 0;
            
            fleetData.forEach((e, i) => {
                if(e.status === 'Active') act++; else inact++;
                const sBadge = e.status === 'Active' ? '<span class="bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-md text-[10px] font-bold border border-emerald-200">ACTIVE</span>' : '<span class="bg-red-50 text-red-600 px-2.5 py-1 rounded-md text-[10px] font-bold border border-red-200">INACTIVE</span>';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-4 font-bold text-slate-500">${e.id}</td>
                        <td class="px-4 py-4">
                            <div class="flex flex-col"><span class="font-extrabold text-slate-800">${e.name}</span><span class="text-xs text-slate-400 font-bold">${e.phone || 'No phone'}</span></div>
                        </td>
                        <td class="px-4 py-4 font-bold text-slate-500">${e.platform}</td>
                        <td class="px-4 py-4 text-center">${sBadge}</td>
                        <td class="px-4 py-4 text-center flex justify-center gap-2">
                            <button onclick="openFormModal(${i})" class="text-slate-400 hover:text-brandAccent bg-slate-50 p-2 rounded-lg hover:bg-blue-50 transition-colors"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteRecord(${i})" class="text-slate-400 hover:text-negRed bg-slate-50 p-2 rounded-lg hover:bg-red-50 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>`;
            });

            document.getElementById('kpi_total').innerText = fleetData.length;
            document.getElementById('kpi_active').innerText = act;
            document.getElementById('kpi_inactive').innerText = inact;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
